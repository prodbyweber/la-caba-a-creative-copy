<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://media.base44.com/images/public/6966ddf48947f217e81ea27c/6b7c4002a_Titulo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <title>Cabaña Creative</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0a0a0b; }

      #splash {
        position: fixed;
        inset: 0;
        background: #0a0a0b;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 999999;
        opacity: 1;
        transition: opacity 0.5s ease;
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #splash img {
        width: 72px;
        height: 72px;
        object-fit: contain;
        /* gentle pulse to indicate loading */
        animation: pulse 1.8s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(0.95); }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <img
        src="https://media.base44.com/images/public/6966ddf48947f217e81ea27c/6b7c4002a_Titulo.png"
        alt="Cabaña Creative"
      />
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Hide splash as soon as React mounts (#root gets children)
      var observer = new MutationObserver(function() {
        var root = document.getElementById('root');
        if (root && root.children.length > 0) {
          observer.disconnect();
          setTimeout(function() {
            var splash = document.getElementById('splash');
            if (splash) {
              splash.classList.add('fade-out');
              setTimeout(function() {
                if (splash.parentNode) splash.parentNode.removeChild(splash);
              }, 550);
            }
          }, 300);
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });

      // Fallback: remove after 4s no matter what
      setTimeout(function() {
        var splash = document.getElementById('splash');
        if (splash) {
          splash.classList.add('fade-out');
          setTimeout(function() {
            if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
          }, 550);
        }
      }, 4000);
    </script>
  </body>
</html>
