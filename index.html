<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://media.base44.com/images/public/6966ddf48947f217e81ea27c/6b7c4002a_Titulo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <title>Cabaña Creative</title>
    <style>
      #splash-screen {
        position: fixed;
        inset: 0;
        background: #0a0a0b;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      #splash-screen.hidden {
        opacity: 0;
        visibility: hidden;
      }
      .splash-logo {
        width: 90px;
        height: 90px;
        animation: splashPulse 1.8s ease-in-out infinite;
      }
      @keyframes splashPulse {
        0%   { opacity: 0.3; transform: scale(0.85); }
        50%  { opacity: 1;   transform: scale(1);    }
        100% { opacity: 0.3; transform: scale(0.85); }
      }
    </style>
  </head>
  <body>
    <!-- Splash screen: visible before React mounts -->
    <div id="splash-screen">
      <img
        class="splash-logo"
        src="https://media.base44.com/images/public/6966ddf48947f217e81ea27c/6b7c4002a_Titulo.png"
        alt="Cabaña Creative"
      />
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Hide splash once React has rendered
      window.__hideSplash = function() {
        var el = document.getElementById('splash-screen');
        if (el) {
          el.classList.add('hidden');
          setTimeout(function() { el.remove(); }, 600);
        }
      };
    </script>
  </body>
</html>
