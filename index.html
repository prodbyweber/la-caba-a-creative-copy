<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://media.base44.com/images/public/6966ddf48947f217e81ea27c/6b7c4002a_Titulo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <title>Cabaña Creative</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #0a0a0b;
        /* prevent any flash of unstyled content */
        overflow: hidden;
      }

      #root {
        /* hide root until splash is gone */
        visibility: hidden;
      }

      #root.ready {
        visibility: visible;
        overflow: auto;
      }

      #splash {
        position: fixed;
        inset: 0;
        background: #0a0a0b;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 999999;
        opacity: 1;
        transition: opacity 0.6s ease;
      }

      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      #splash-logo {
        width: 64px;
        height: 64px;
        object-fit: contain;
        animation: cabana-pulse 1.6s ease-in-out infinite;
      }

      @keyframes cabana-pulse {
        0%, 100% { opacity: 1;   transform: scale(1); }
        50%       { opacity: 0.6; transform: scale(0.93); }
      }
    </style>
  </head>
  <body>
    <!-- Splash shown immediately, before any JS executes -->
    <div id="splash">
      <img
        id="splash-logo"
        src="https://media.base44.com/images/public/6966ddf48947f217e81ea27c/6b7c4002a_Titulo.png"
        alt="Cabaña Creative"
      />
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      (function () {
        var root = document.getElementById('root');
        var splash = document.getElementById('splash');

        function hideSplash() {
          if (!splash) return;
          // Make the app visible first, then fade splash
          root.classList.add('ready');
          document.body.style.overflow = '';
          splash.classList.add('fade-out');
          setTimeout(function () {
            if (splash && splash.parentNode) {
              splash.parentNode.removeChild(splash);
            }
          }, 650);
          splash = null;
        }

        // Watch for React to mount content into #root
        var observer = new MutationObserver(function () {
          if (root.children.length > 0) {
            observer.disconnect();
            // Small delay so first paint renders before we reveal
            setTimeout(hideSplash, 250);
          }
        });
        observer.observe(root, { childList: true });

        // Hard fallback: never leave user stuck > 5s
        setTimeout(function () {
          observer.disconnect();
          hideSplash();
        }, 5000);
      })();
    </script>
  </body>
</html>
