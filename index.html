<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="https://media.base44.com/images/public/6966ddf48947f217e81ea27c/6b7c4002a_Titulo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Audio en segundo plano: iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>Cabaña Creative</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18190555269"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'AW-18190555269');
    </script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { background: #0a0a0b; min-height: 100%; min-height: 100dvh; }
      body {
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
      }
      #root {
        background: #0a0a0b;
        min-height: 100dvh;
      }

      /* Ocultar controles nativos del navegador en todos los vídeos */
      video::-webkit-media-controls,
      video::-webkit-media-controls-enclosure,
      video::-webkit-media-controls-panel,
      video::-webkit-media-controls-overlay-play-button,
      video::-webkit-media-controls-start-playback-button { display: none !important; }
      video { -webkit-appearance: none; }

      #splash {
        position: fixed;
        inset: 0;
        background: #0a0a0b;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 999999;
        opacity: 1;
        transition: opacity 0.6s ease;
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #splash img {
        width: 64px;
        height: 64px;
        object-fit: contain;
        animation: cabana-pulse 1.6s ease-in-out infinite;
      }
      @keyframes cabana-pulse {
        0%, 100% { opacity: 1;   transform: scale(1); }
        50%       { opacity: 0.6; transform: scale(0.93); }
      }

    </style>
  </head>
  <body>
    <div id="splash">
      <img
        src="https://media.base44.com/images/public/6966ddf48947f217e81ea27c/6b7c4002a_Titulo.png"
        alt="Cabaña Creative"
      />
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Expose a global function that React calls when the app is truly ready
      window.__cabanaHideSplash = function () {
        var splash = document.getElementById('splash');
        if (!splash) return;
        splash.classList.add('fade-out');
        setTimeout(function () {
          if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
        }, 650);
      };

      // Hard fallback: never leave user stuck > 6s
      setTimeout(function () {
        window.__cabanaHideSplash && window.__cabanaHideSplash();
      }, 6000);
    </script>
  </body>
</html>
