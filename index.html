    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { background: #0a0a0b; min-height: 100%; min-height: 100dvh; }
      body {
        overscroll-behavior: none;

      }
      #root {

        min-height: 100dvh;
      }

      /* Ocultar controles nativos del navegador en todos los vídeos */

      video { -webkit-appearance: none; }

      #splash {
        position: fixed;
        inset: 0;
        background: #0a0a0b;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 999999;
        opacity: 1;
        transition: opacity 0.6s ease;
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #splash img {
        width: 64px;
        height: 64px;
        object-fit: contain;
        animation: cabana-pulse 1.6s ease-in-out infinite;
      }
      @keyframes cabana-pulse {
        0%, 100% { opacity: 1;   transform: scale(1); }
        50%       { opacity: 0.6; transform: scale(0.93); }
      }

    <script>
      // Expose a global function that React calls when the app is truly ready
      window.__cabanaHideSplash = function () {
        var splash = document.getElementById('splash');
        if (!splash) return;
        splash.classList.add('fade-out');
        setTimeout(function () {
          if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
        }, 650);
      };

      // Hard fallback: never leave user stuck > 6s
      setTimeout(function () {
        window.__cabanaHideSplash && window.__cabanaHideSplash();
      }, 6000);
    </script>
